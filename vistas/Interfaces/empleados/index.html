<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUILDPRO - Panel de Inicio del Empleado</title>
    <style>
        :root {
            --bg-primary: #070d14;
            --bg-surface: rgba(17, 30, 43, 0.45);
            --bg-card-hover: rgba(23, 38, 55, 0.8);
            --accent: #ffb703;
            --accent-hover: #fb8500;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 183, 3, 0.4);
            --success: #10b981;
            --info: #3b82f6;
            --purple: #a855f7;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(180deg, rgba(7, 13, 20, 0.95) 0%, rgba(10, 17, 24, 0.98) 100%), 
                        url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* Barra de Navegación Premium */
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(7, 13, 20, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 18px 40px;
            border-bottom: 1px solid var(--border-color);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            z-index: 10;
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-main);
        }

        .logo span {
            color: var(--accent);
            text-shadow: 0 0 15px rgba(255, 183, 3, 0.5);
        }

        .btn-logout {
            color: #f87171;
            text-decoration: none;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(239, 68, 68, 0.08);
            padding: 10px 18px;
            border-radius: 10px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            transition: all 0.3s ease;
        }

        .btn-logout:hover {
            background: rgba(239, 68, 68, 0.2);
            border-color: #ef4444;
            transform: translateY(-1px);
        }

        /* Contenedor Principal (Layout de Inicio Centrado) */
        .main-container {
            flex: 1;
            padding: 40px 20px;
            max-width: 680px;
            margin: 0 auto;
            width: 100%;
            z-index: 2;
        }

        /* Encabezado Principal de Bienvenida */
        .welcome-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .welcome-header h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 4px;
        }

        .welcome-header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        /* Tarjeta de Identificación Flotante (Glassmorphism) */
        .profile-badge {
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 22px;
            padding: 24px;
            margin-bottom: 35px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .avatar {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            color: #070d14;
            box-shadow: 0 8px 20px rgba(255, 183, 3, 0.25);
            flex-shrink: 0;
        }

        .profile-details h2 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
        }

        .profile-details p {
            font-size: 13px;
            color: var(--accent);
            font-weight: 600;
            margin-top: 1px;
        }

        .location-tag {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 8px;
            font-size: 12px;
            color: #cbd5e1;
            background: rgba(255, 255, 255, 0.05);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .pulse-dot {
            width: 7px;
            height: 7px;
            background-color: var(--success);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--success);
        }

        /* Grid de Secciones Operativas */
        .section-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 800;
            padding-left: 4px;
        }

        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Tarjetas de Módulo Estilo Botón */
        .menu-item-card {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            padding: 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            text-align: left;
        }

        .menu-item-card:hover {
            background: var(--bg-card-hover);
            border-color: var(--border-hover);
            transform: translateY(-3px);
            box-shadow: 0 12px 24px rgba(255, 183, 3, 0.08);
        }

        .card-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .icon-box {
            width: 52px;
            height: 52px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .menu-item-card:hover .icon-box {
            transform: scale(1.05);
        }

        .card-text h3 {
            font-size: 16px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 2px;
        }

        .card-text p {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .arrow-indicator {
            color: var(--text-muted);
            transition: all 0.3s ease;
            padding-right: 5px;
        }

        .menu-item-card:hover .arrow-indicator {
            color: var(--accent);
            transform: translateX(4px);
        }

        /* Paleta Temática por Caso de Uso */
        .color-success { background: rgba(16, 185, 129, 0.12); color: #34d399; }
        .color-accent { background: rgba(255, 183, 3, 0.12); color: var(--accent); }
        .color-purple { background: rgba(168, 85, 247, 0.12); color: #c084fc; }
        .color-info { background: rgba(59, 130, 246, 0.12); color: #60a5fa; }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="#" class="logo">BUILD<span>PRO</span></a>
        <a href="#" class="btn-logout" onclick="alert('Caso de Uso: Cerrar Sesión\nFinalizando de forma segura el acceso del operario.')">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Cerrar Sesión
        </a>
    </header>

    <main class="main-container">
        
        <div class="welcome-header">
            <h1>Panel de Control</h1>
            <p>Bienvenido al sistema de registro de terreno de BUILDPRO.</p>
        </div>

        <section class="profile-badge">
            <div class="avatar">MG</div>
            <div class="profile-details">
                <h2>Marcos Aurelio Gómez</h2>
                <p>Legajo: LEG-9942 • Oficial Armador</p>
                <div class="location-tag">
                    <span class="pulse-dot"></span>
                    Torre Skyline Residencial
                </div>
            </div>
        </section>

        <h3 class="section-label">Flujos de Trabajo Disponibles</h3>

        <div class="menu-grid">

            <button class="menu-item-card" onclick="alert('Caso de Uso: Registrar Obras Trabajadas\nAbriendo interfaz de fichaje biométrico y geolocalizado en Torre Skyline Residencial.')">
                <div class="card-left">
                    <div class="icon-box color-success">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    </div>
                    <div class="card-text">
                        <h3>Registrar Obra Trabajada</h3>
                        <p>Fichar ingresos, egresos y marcar horas de servicios.</p>
                    </div>
                </div>
                <div class="arrow-indicator">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>
            </button>

            <button class="menu-item-card" onclick="alert('Caso de Uso: Registrar Tareas Realizadas\nCargando panel diario de mampostería, colado de hormigón y armado estructural.')">
                <div class="card-left">
                    <div class="icon-box color-accent">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                    </div>
                    <div class="card-text">
                        <h3>Registrar Tareas Realizadas</h3>
                        <p>Reportar avances de obra y asignaciones cumplidas hoy.</p>
                    </div>
                </div>
                <div class="arrow-indicator">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>
            </button>

            <button class="menu-item-card" onclick="alert('Caso de Uso: Registrar Asesoría\nAbriendo sistema de carga para informes técnicos, auditorías de seguridad o minutas estructurales.')">
                <div class="card-left">
                    <div class="icon-box color-purple">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    </div>
                    <div class="card-text">
                        <h3>Registrar Asesoría</h3>
                        <p>Registrar minutas profesionales o inspecciones externas.</p>
                    </div>
                </div>
                <div class="arrow-indicator">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>
            </button>

            <button class="menu-item-card" onclick="alert('Caso de Uso: Consultar Historial Laboral\nCargando resumen de frentes de obra previos, asistencia y horas acumuladas.')">
                <div class="card-left">
                    <div class="icon-box color-info">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"></path><path d="M12 6v6l4 2"></path></svg>
                    </div>
                    <div class="card-text">
                        <h3>Consultar Historial Laboral</h3>
                        <p>Revisar asistencias anteriores y horas registradas en sistema.</p>
                    </div>
                </div>
                <div class="arrow-indicator">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>
            </button>

        </div>
    </main>

</body>
</html>
