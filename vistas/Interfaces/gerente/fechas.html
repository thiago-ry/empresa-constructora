<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUILDPRO - Asignación de Fechas de Proyecto</title>
    <style>
        :root {
            --bg-primary: #070d14;
            --bg-surface: rgba(17, 30, 43, 0.45);
            --bg-card-hover: rgba(23, 38, 55, 0.85);
            --accent: #ffb703;
            --accent-hover: #fb8500;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.06);
            --success: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(180deg, rgba(7, 13, 20, 0.95) 0%, rgba(10, 17, 24, 0.98) 100%), 
                        url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Contenedor Principal de la Ventana de Fechas */
        .date-container {
            width: 100%;
            max-width: 500px;
            background: var(--bg-surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        /* Identidad Visual Breve */
        .brand {
            font-size: 14px;
            font-weight: 800;
            letter-spacing: 3px;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .brand span {
            color: var(--accent);
        }

        h1 {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 35px;
            line-height: 1.4;
        }

        /* Formulario y Selectores */
        .form-group {
            text-align: left;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent);
        }

        /* Input de Fecha Estilizado */
        input[type="date"] {
            width: 100%;
            background: rgba(7, 13, 20, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px 16px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            outline: none;
        }

        input[type="date"]:focus {
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(255, 183, 3, 0.2);
            background: rgba(7, 13, 20, 0.8);
        }

        /* Cambiar el color del icono del calendario nativo a blanco */
        input[type="date"]::-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.2s;
        }

        input[type="date"]::-calendar-picker-indicator:hover {
            opacity: 1;
        }

        /* Botonera de Control */
        .actions-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 35px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-primary {
            background: var(--accent);
            color: #070d14;
            box-shadow: 0 4px 15px rgba(255, 183, 3, 0.2);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--text-muted);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="date-container">
        <div class="brand">BUILD<span>PRO</span></div>
        <h1>Plazos del Proyecto</h1>
        <p class="subtitle">Establezca con precisión el marco temporal para el inicio y la culminación de la obra seleccionada.</p>

        <form onsubmit="event.preventDefault(); alert('Plazos guardados con éxito en el sistema central.'); window.location.href='gerente-obras.html';">
            
            <div class="form-group">
                <label for="fecha-inicio">Fecha de Inicio de Obra</label>
                <input type="date" id="fecha-inicio" required>
            </div>

            <div class="form-group">
                <label for="fecha-fin">Fecha de Finalización Estimada</label>
                <input type="date" id="fecha-fin" required>
            </div>

            <div class="actions-group">
                <button type="submit" class="btn btn-primary">Guardar Cronograma</button>
                <button type="button" class="btn btn-secondary" onclick="window.location.href='gerente-obras.html';">Cancelar</button>
            </div>

        </form>
    </div>

</body>
</html>
