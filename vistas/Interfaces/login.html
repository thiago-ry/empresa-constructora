<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BUILDPRO - Iniciar Sesión</title>
    <style>
        :root {
            --bg-primary: #02060d;
            --bg-surface: rgba(15, 27, 43, 0.45);
            --bg-surface-hover: rgba(22, 42, 69, 0.6);
            --accent: #ffb703;
            --accent-hover: #fb8500;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.06);
            --glow: rgba(255, 183, 3, 0.35);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, rgba(2, 6, 13, 0.95) 0%, rgba(4, 12, 23, 0.98) 100%), 
                        url('https://images.unsplash.com/photo-1541888946425-d81bb19240f5?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
            background: var(--bg-surface);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            text-align: center;
        }

        .logo { font-size: 28px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; text-decoration: none; color: var(--text-main); margin-bottom: 8px; display: inline-block; }
        .logo span { color: var(--accent); text-shadow: 0 0 20px var(--glow); }

        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 35px; }

        .form-group { margin-bottom: 20px; text-align: left; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 11px; font-weight: 700; text-transform: uppercase; color: var(--text-muted); letter-spacing: 1px; }
        
        .input-wrapper { position: relative; width: 100%; }
        input { width: 100%; background: rgba(2, 6, 13, 0.6); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px; padding: 14px 16px; color: #fff; font-size: 14px; outline: none; transition: all 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(255, 183, 3, 0.1); }

        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; font-size: 13px; }
        .remember-me { display: flex; align-items: center; gap: 8px; color: var(--text-muted); cursor: pointer; }
        .remember-me input { width: auto; cursor: pointer; }
        .forgot-pass { color: var(--accent); text-decoration: none; font-weight: 600; transition: color 0.2s; }
        .forgot-pass:hover { color: var(--accent-hover); }

        .btn-submit { width: 100%; background: var(--accent); color: #02060d; padding: 15px; font-size: 14px; font-weight: 800; border: none; border-radius: 10px; text-transform: uppercase; cursor: pointer; transition: all 0.3s; letter-spacing: 0.5px; box-shadow: 0 4px 20px rgba(255, 183, 3, 0.25); margin-bottom: 25px; }
        .btn-submit:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 6px 25px var(--glow); }

        .footer-link { color: var(--text-muted); font-size: 13px; }
        .footer-link a { color: var(--text-main); text-decoration: none; font-weight: 700; transition: color 0.2s; }
        .footer-link a:hover { color: var(--accent); }
    </style>
</head>
<body>

    <div class="login-container">
        <a href="index.html" class="logo">BUILD<span>PRO</span></a>
        <p class="subtitle">Ingrese sus credenciales de acceso corporativo</p>

        <!-- Redirecciona al panel principal "admin-home.html" al enviar -->
        <form action="admin-home.html" method="GET">
            <div class="form-group">
                <label>Correo Electrónico Corporativo</label>
                <div class="input-wrapper">
                    <input type="email" placeholder="usuario@buildpro.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Contraseña</label>
                <div class="input-wrapper">
                    <input type="password" placeholder="••••••••••••" required>
                </div>
            </div>

            <div class="form-options">
                <label class="remember-me">
                    <input type="checkbox"> Recordar dispositivo
                </label>
                <a href="#" class="forgot-pass" onclick="alert('Instrucciones de recuperación enviadas al buzón registrado corporativo.');">¿Olvidó su contraseña?</a>
            </div>

            <button type="submit" class="btn-submit">Autenticar Ingreso</button>
        </form>

        <p class="footer-link">¿Su empresa no tiene cuenta? <a href="registro.html">Regístrese aquí</a></p>
    </div>

</body>
</html>
